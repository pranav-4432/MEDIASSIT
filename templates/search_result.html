<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        header {
            background: #004085;
            color: white;
            padding: 20px 40px;
            text-align: center;
            font-size: 24px;
            position: relative;
            border-bottom: 4px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-light bg-light mb-4">
        <a href="{{ url_for('index') }}" class="navbar-brand">MedAssist</a>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-primary btn-sm">Dashboard</a>
        <a href="{{ url_for('patient_search_page') }}" class="btn btn-outline-secondary btn-sm">Patient Search</a>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">Logout</a>
    </nav>
    <div class="container mt-5">
        <h2 class="mb-4">Search Results</h2>

        {% if user %}
        <div class="row">
            {% for u in user %}
            <a href="{{ url_for('dashboard') }}">
                <div class="col-md-4">
                    <div class="card mb-3 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">{{ u.Name }}</h5>
                            <!-- <p class="card-text"><strong>Company:</strong> {{ u.company }}</p> -->
                        </div>
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <div class="alert alert-warning" role="alert">
            No results found.
        </div>
        {% endif %}

        <a href="{{ url_for('dashboard') }}" class="btn btn-primary mt-3">Back to Dashboard</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
